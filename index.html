<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --yellow: #f5e642;
      --white: #f0ece0;
      --stripe-dark: #111;
      --stripe-yellow: #f5e642;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Diagonal hazard stripes top bar */
    .hazard-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 18px;
      background: repeating-linear-gradient(
        -45deg,
        var(--stripe-yellow) 0px,
        var(--stripe-yellow) 20px,
        var(--stripe-dark) 20px,
        var(--stripe-dark) 40px
      );
      z-index: 100;
    }

    .hazard-bar.bottom {
      top: auto;
      bottom: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* Noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: -200%;
      width: 400%;
      height: 400%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
      animation: grain 0.4s steps(1) infinite;
    }

    @keyframes grain {
      0%  { transform: translate(0, 0); }
      20% { transform: translate(-3%, -5%); }
      40% { transform: translate(5%, 2%); }
      60% { transform: translate(-2%, 7%); }
      80% { transform: translate(4%, -3%); }
      100%{ transform: translate(0, 0); }
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 780px;
    }

    .icon-wrap {
      margin-bottom: 2rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .gear-svg {
      width: 90px;
      height: 90px;
      animation: spin 8s linear infinite;
      filter: drop-shadow(0 0 18px rgba(245, 230, 66, 0.5));
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--yellow);
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--white);
      margin-bottom: 0.4rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    h1 span {
      color: var(--yellow);
      display: inline-block;
      position: relative;
    }

    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 0; right: 0;
      height: 4px;
      background: var(--yellow);
    }

    .tagline {
      font-size: 0.8rem;
      color: rgba(240, 236, 224, 0.5);
      letter-spacing: 0.1em;
      margin-top: 1.6rem;
      font-style: italic;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.8s forwards;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(240,236,224,0.4);
      margin-bottom: 0.5rem;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--yellow);
      animation: fill 2.5s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0;
      width: 30px; height: 100%;
      background: white;
      opacity: 0.6;
      filter: blur(4px);
    }

    @keyframes fill {
      to { width: 67%; }
    }

    /* Blink cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--yellow);
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Status line */
    .status {
      margin-top: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(240,236,224,0.3);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease 1s forwards;
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--yellow);
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      border-color: rgba(245,230,66,0.25);
      border-style: solid;
      z-index: 10;
    }
    .corner.tl { top: 28px; left: 16px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 28px; right: 16px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 28px; left: 16px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 28px; right: 16px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>

  <div class="hazard-bar"></div>
  <div class="hazard-bar bottom"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <div class="icon-wrap">
      <!-- Gear SVG -->
      <svg class="gear-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#f5e642" d="
          M43 5h14l2 10a32 32 0 0 1 8.3 3.4l9-5 9.9 9.9-5 9A32 32 0 0 1 85 41l10 2v14l-10 2a32 32 0 0 1-3.4 8.3l5 9-9.9 9.9-9-5A32 32 0 0 1 59 85l-2 10H43l-2-10a32 32 0 0 1-8.3-3.4l-9 5-9.9-9.9 5-9A32 32 0 0 1 15 59L5 57V43l10-2a32 32 0 0 1 3.4-8.3l-5-9 9.9-9.9 9 5A32 32 0 0 1 41 15z
        "/>
        <circle cx="50" cy="50" r="16" fill="#0a0a0a"/>
        <circle cx="50" cy="50" r="10" fill="#f5e642" opacity="0.2"/>
      </svg>
    </div>

    <div class="label">// status update</div>

    <h1>SITE <span>UNDER</span><br>CONSTRUCTION</h1>

    <p class="tagline">something extraordinary is being built — check back soon<span class="cursor"></span></p>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>BUILD PROGRESS</span>
        <span>67%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="status">
      <span class="dot"></span>systems online &nbsp;·&nbsp; crew at work &nbsp;·&nbsp; launching soon
    </div>
  </div>

</body>
</html>
